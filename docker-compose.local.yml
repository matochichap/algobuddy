# connect with local db containers
# docker compose -f docker-compose.local.yml up
name: algobuddy-local
services:
  ui:
    image: ghcr.io/matochichap/algobuddy-ui:latest
    hostname: "ui"
    networks:
      - algobuddy
  api-gateway:
    image: ghcr.io/matochichap/algobuddy-api-gateway:latest
    env_file:
      - ./.env.production.local
    ports:
      - "4000:4000"
    networks:
      - algobuddy
  user-service:
    image: ghcr.io/matochichap/algobuddy-user-service:latest
    hostname: "user-service"
    env_file:
      - ./.env.production.local
    networks:
      - algobuddy
    depends_on:
      - mongo-init
      - redis
  matching-service:
    image: ghcr.io/matochichap/algobuddy-matching-service:latest
    hostname: "matching-service"
    env_file:
      - ./.env.production.local
    networks:
      - algobuddy
    depends_on:
      - redis
  question-service:
    image: ghcr.io/matochichap/algobuddy-question-service:latest
    hostname: "question-service"
    env_file:
      - ./.env.production.local
    networks:
      - algobuddy
    depends_on:
      - mongo-init
  collaboration-service:
    image: ghcr.io/matochichap/algobuddy-collaboration-service:latest
    hostname: "collaboration-service"
    env_file:
      - ./.env.production.local
    networks:
      - algobuddy
    depends_on:
      - redis
  redis:
    image: redis:latest
    hostname: "redis"
    command: redis-server --notify-keyspace-events Ex
    volumes:
      - ./db/redis_data_build:/data/db
    networks:
      - algobuddy
  mongo:
    image: mongo
    hostname: "mongo"
    command: mongod --replSet rs0 --bind_ip_all --port 27017
    volumes:
      - ./db/mongo_data_build:/data/db
    networks:
      - algobuddy
  mongo-init:
    image: mongo
    volumes:
      - ./db/config/init-mongo.sh:/init-mongo.sh
    entrypoint: sh /init-mongo.sh
    networks:
      - algobuddy
    depends_on:
      - mongo

networks:
  algobuddy:

volumes:
  redis_data:
  mongo_data:
